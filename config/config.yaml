api:
  host: "https://clob.polymarket.com"
  chain_id: 137

s3:
  enabled: true                            # set false to use local files only
  bucket: "k-polymarket-data"
  prefix: "data"                           # S3 key prefix matching the local data/ layout
  region: "us-west-2"
  local_cache_dir: "/tmp/polymarket_s3"   # downloaded files are cached here locally

trading:
  paper_trading: true   # flip to false for live trading
  interval: 300         # 5-minute cycles (seconds)
  exit_rule: default    # "default" (strategy-defined) or "hold_to_expiry" (settle at resolution)

updown_bot:
  default_asset: "BTC"              # which asset to trade when --asset is not specified
  state_file: "bot_state.json"
  perf_db_path: "perf.db"
  min_volume: 0  # 0 — don't filter by volume so brand-new markets are found immediately

# Per-asset configuration for Up/Down markets.
# slug_prefix: used to build the Gamma API slug  →  {slug_prefix}-{slot_ts}
# market_keywords: fallback keyword search when slug lookup misses
# chainlink_symbol: Chainlink RTDS topic symbol for settlement price
# price_symbol / price_exchange: live price feed for feature computation
assets:
  BTC:
    slug_prefix: "btc-updown-5m"
    market_keywords: ["Bitcoin", "Up or Down"]
    chainlink_symbol: "btc/usd"
    price_symbol: "btcusdt"
    price_exchange: "binance"
  ETH:
    slug_prefix: "eth-updown-5m"
    market_keywords: ["Ethereum", "Up or Down"]
    chainlink_symbol: "eth/usd"
    price_symbol: "ethusdt"
    price_exchange: "binance"
  SOL:
    slug_prefix: "sol-updown-5m"
    market_keywords: ["Solana", "Up or Down"]
    chainlink_symbol: "sol/usd"
    price_symbol: "solusdt"
    price_exchange: "binance"
  DOGE:
    slug_prefix: "doge-updown-5m"
    market_keywords: ["Dogecoin", "Up or Down"]
    chainlink_symbol: "doge/usd"
    price_symbol: "dogeusdt"
    price_exchange: "binance"
  XRP:
    slug_prefix: "xrp-updown-5m"
    market_keywords: ["XRP", "Up or Down"]
    chainlink_symbol: "xrp/usd"
    price_symbol: "xrpusdt"
    price_exchange: "binance"

# Legacy alias — code reads updown_bot; keep btc_updown_bot as fallback
btc_updown_bot:
  market_keywords: ["Bitcoin", "Up or Down"]
  state_file: "bot_state.json"
  perf_db_path: "perf.db"
  min_volume: 0

strategies:
  coin_toss:
    enabled: true              # baseline test; flip to false to disable
    position_size_usdc: 5.0    # small size for pipeline testing
    max_hold_seconds: 60       # short hold for testing — exit quickly
    profit_target_pct: 0.10   # 10% take-profit
    stop_loss_pct: 0.05        # 5% stop-loss
    min_confidence: 0.5        # coin flip always has confidence=0.5

  prob_edge:
    # Probability-native edge strategy — production strategy path.
    # Decision: BUY YES/NO only when model edge exceeds threshold.
    # Model: BTCUpDownBaselineModel (GBM) by default; swap via model_service.
    enabled: true
    btc_symbol: "BTC-USD"        # BTC feed symbol
    btc_exchange: "coinbase"     # BTC feed exchange

    # Entry filters
    min_edge: 0.04               # edge = p - ask must clear this (e.g. p=0.60, ask=0.55 → edge=0.05)
    max_spread_pct: 0.06         # reject entry when spread > 6% of mid
    min_seconds_to_expiry: 30    # don't enter with < 30s until resolution
    max_seconds_to_expiry: 280   # don't enter at very start of slot (data warming up)

    # Exit rules
    stop_loss_pct: 0.15          # exit if position drops 15% from entry
    max_hold_seconds: 270        # force-exit before the 5-min window closes
    exit_edge: -0.02             # edge-reprice exit: close if model reprices edge < -0.02

    # Kelly sizing
    kelly_fraction: 0.15         # fractional Kelly multiplier (range 0.10–0.25)
    position_size_usdc: 30.0     # hard cap on notional per trade
    fee_enabled: true            # enable fee-aware net-edge filter for Polymarket fee-enabled crypto markets
    taker_fee_rate: 0.072        # docs formula input for crypto category as of 2026-04-02
    taker_fee_exponent: 1.0      # docs formula exponent for crypto category as of 2026-04-02

    # Confidence gate
    min_confidence: 0.51         # minimum model prob to allow trade

    # Sequential re-entry within a slot
    allow_reentry: true
    max_trades_per_slot: 3       # hard cap on entries per 5-min market
    re_entry_edge_mult: 1.5      # 2nd+ entry requires 1.5× the normal edge threshold
    re_entry_size_mult: 0.5      # 2nd+ entry uses 50% Kelly size (correlation haircut)
    slot_loss_limit_usdc: 15.0   # halt slot trading if cumulative loss exceeds this

    # Edge-stability debounce: require net_edge to clear the required
    # threshold for this many consecutive ticks in the same slot before
    # firing. Counters reset at rollover. 1 = no debouncing (legacy). Bump
    # to 2–3 to filter single-tick orderbook flickers / feature blips.
    min_stable_ticks: 1

  logreg_edge:
    # Legacy logistic regression edge strategy (uses old LogRegModel class).
    # Kept for backwards compatibility. New runs should use --strategy logreg
    # which loads the v4 model from models/logreg_v4.
    enabled: true
    btc_symbol: "BTC-USD"
    btc_exchange: "coinbase"
    model_dir: "models/logreg"

    delta: 0.05
    max_spread_pct: 0.06
    min_seconds_to_expiry: 10
    max_seconds_to_expiry: 295
    max_hold_seconds: 300        # hold-to-expiry; unused at runtime (exit_rule is hardcoded), capped at slot length for display/safety
    kelly_fraction: 0.15
    position_size_usdc: 30.0
    min_confidence: 0.51

    # Edge-stability debounce — see prob_edge.min_stable_ticks for rationale.
    min_stable_ticks: 1

  logreg:
    # Active logistic-regression strategy. Loads the v4 model
    # (18 features + isotonic calibration) via LogRegV4Model.
    enabled: true
    btc_symbol: "BTC-USD"
    btc_exchange: "coinbase"
    model_dir: "models/logreg_v4"

    # Entry filters
    delta: 0.025                  # minimum margin of safety beyond cost (override at runtime via --delta)
    max_spread_pct: 0.06         # reject if spread > 6% of mid
    min_seconds_to_expiry: 10    # don't enter with < 10s left (execution risk)
    max_seconds_to_expiry: 295   # allow entry near slot open
    min_entry_price: 0.30        # skip cheap contracts (data: <0.35 loses money)
    max_entry_price: 0.65        # skip expensive contracts (data: >0.65 loses money)
    min_entry_window_s: 10       # require ≥10s left in slot to open (matches min_seconds_to_expiry)

    # Hold-to-expiry: exit_rule is hardcoded to "hold_to_expiry" in
    # LogRegEdgeStrategy, so this value is not consulted at runtime.
    # Kept ≤ slot length (300s) so the dashboard display is truthful and
    # so that flipping exit_rule later doesn't silently disable the cap.
    max_hold_seconds: 300

    # Kelly sizing. Notional = clip(kelly_notional, min, max).
    #   min: operational floor — small balances produce sub-$5 raw Kelly,
    #        which isn't meaningfully placeable. Floor only applies when
    #        Kelly > 0 (no edge → no trade).
    #   max: explicit USDC ceiling enforced by the strategy. Do NOT trust
    #        RiskManager alone — see tasks/todo.md for the units fix.
    kelly_fraction: 0.10              # fractional Kelly multiplier
    min_position_size_usdc: 10.0      # floor — applied only when Kelly > 0
    max_position_size_usdc: 50.0      # hard ceiling per trade

    # Confidence gate
    min_confidence: 0.52         # minimum model prob to allow trade (raised from 0.51)

    # Online retraining: a daemon thread refits the model on a rolling
    # window of live CSV data. Hot-swaps only when the strategy is flat,
    # and only if the new valid_brier does not regress vs the current
    # production model by more than tolerance_brier.
    retrain:
      enabled: false             # flip to true once you've watched a few cycles
      interval_s: 3600           # run one retrain attempt every hour
      window_s: 172800           # use last 48h of live data
      tolerance_brier: 0.005     # accept new model iff new_brier ≤ prod_brier + this
      min_train_rows: 500        # skip the pass if the window has fewer rows than this
      # Recursive glob patterns — the bot writes session CSVs into
      # date-partitioned dirs (data/YYYY-MM-DD/). The `**/` prefix
      # ensures both flat (legacy) and partitioned files are found.
      ob_csv_glob:  "data/**/live_orderbook_snapshots*.csv"
      btc_csv_glob: "data/**/btc_live_1s*.csv"
      history_path: "data/retrain_history.jsonl"
      output_parent: "models"
      model_prefix: "logreg_v4"

    # Late-slot snipe — opt-in microstructure path that fires once per slot
    # when the market price is already near a resolution corner AND BTC has
    # cleared the strike by enough that a 20-second reversal is implausible.
    # Bypasses the normal min_seconds_to_expiry / min_entry_price gates;
    # has its own (stricter, different-shape) gates instead. Does NOT
    # consult the model — thesis is microstructure mispricing harvest, not
    # prediction. Cycle-level min_entry_window_s must be ≤ max_tte_s for
    # the snipe to actually reach place_order. See `tasks/lessons.md`
    # entry "late-slot snipe" for the trade thesis.
    #
    # The same defaults are used by logreg_fb and xgb_fb — anchored here,
    # referenced via `*late_snipe_defaults` below.
    late_snipe: &late_snipe_defaults
      enabled: false
      max_tte_s: 30                # only consider when ≤30s left
      min_entry_price: 0.90        # market price floor (chosen-side ask)
      max_entry_price: 0.95        # market price ceiling
      min_moneyness_bps: 50        # |BTC − strike| / strike in bps
      max_spread_pct: 0.03         # tighter than normal entry — no time to wait
      size_usdc: 5.0               # small fixed size; bypasses Kelly

  logreg_fb:
    # Feature-builder-driven LogReg strategy. Loads artifacts produced by
    # scripts/train.py (schema.json + logreg_model.pkl + scaler + calibrator).
    # Uses the main feature builder (Family A/B/C included), and the loader
    # owns its SlotPathState so Family C path features are live.
    #
    # Exchange MUST match the training data source. S3 snapshots record
    # btc_source="binance" — using any other venue would shift the feature
    # distribution vs training.
    # Symbol format is exchange-specific: Binance uses "btcusdt", Coinbase
    # uses "BTC-USD". BtcPriceFeed subscribes to {symbol}@bookTicker for
    # binance, so the wrong format causes silent zero-tick stream.
    enabled: false
    btc_symbol: "btcusdt"
    btc_exchange: "binance"
    # Tuned model: 11 features selected via random-sentinel probe on 4 days
    # of S3 data (2026-04-16..19), then Optuna (60 LogReg + 60 XGB trials).
    # 14f = 11 baseline + 3 Family D interactions (moneyness_x_tte,
    # microprice_x_tte, strike_crosses_x_vol). LogReg Brier 0.1522 /
    # Sharpe 1.88 / PnL 4.24 on val; XGB Brier 0.1493. Both PROMOTE vs probe.
    # Prior 11f artifact preserved at models/full_week_tuned.
    # Full selection rationale: experiments/full-week/selection_interactions.yaml.
    model_dir: "models/full_week_interactions_tuned"

    # Entry filters — same shape as logreg; thresholds live in the model's
    # LogRegFBModel.thresholds property.
    #
    # Entry window: TTE in [120, 240] → trade only between 60s and 180s into
    # the slot. The main cycle at slot-open (TTE≈298) correctly skips — we
    # don't want to trade while the book and BTC feed are still settling.
    # Intra-cycle analysis fires every 30s inside ticker_until_next_cycle
    # (see src/engine/cycle_runner.py:run_intra_cycle) and calls the same
    # strategy.analyze() path, so ticks at TTE=240, 210, 180, 150, 120 all
    # get a chance to fire an entry. The strategy's is_flat guard ensures at
    # most one entry per slot. exit_rule is hardcoded to "hold_to_expiry" so
    # the position is carried through to settlement.
    delta: 0.015
    max_spread_pct: 0.05
    min_seconds_to_expiry: 30
    max_seconds_to_expiry: 290
    min_entry_price: 0.2
    max_entry_price: 0.8
    min_entry_window_s: 10
    max_hold_seconds: 300

    # Kelly sizing
    kelly_fraction: 0.10
    min_position_size_usdc: 5.0
    max_position_size_usdc: 20.0

    # Confidence gate
    min_confidence: 0

    late_snipe: *late_snipe_defaults

  xgb_fb:
    # Feature-builder-driven XGB strategy. Same strategy class as logreg_fb
    # (LogRegEdgeStrategy), just swaps in XGBFBModel. Expects artifacts
    # produced by scripts/train.py with model_type=xgb (schema.json +
    # xgb_model.json + scaler + calibrator).
    enabled: true
    btc_symbol: "btcusdt"
    btc_exchange: "binance"
    model_dir: "models/signed_v2"

    # Entry filters — current values reflect the post-diagnose tuning.
    # See tasks/postmortem_2026-04-25.md for the bucket analysis that
    # picked these thresholds.
    delta: 0.04
    max_spread_pct: 0.04
    min_seconds_to_expiry: 50
    max_seconds_to_expiry: 290
    min_entry_price: 0.3
    max_entry_price: 0.7
    min_entry_window_s: 10
    max_hold_seconds: 300
    min_stable_ticks: 2          # require edge to persist 2 consecutive ticks

    # Kelly sizing
    kelly_fraction: 0.05
    min_position_size_usdc: 5.0
    max_position_size_usdc: 10.0

    # Confidence gate. XGBFBModel clamps signal.confidence up to this floor
    # before should_enter sees it, so this value must match the model's
    # min_prob_yes threshold to be effective.
    min_confidence: 0.55

    late_snipe: *late_snipe_defaults

risk:
  max_position_pct: 0.05          # 5% of balance per position
  max_total_exposure: 1.0         # total open notional as fraction of balance
  max_daily_loss: 0.3             # pct-based daily loss (1.0 = disabled; use max_session_loss_usdc instead)
  max_session_loss_usdc: 200       # absolute session loss cap in USDC — the real stop-loss

  # Rolling kill switches — halt new entries when recent performance is bad
  # enough that we should stop and look. These are strict short-window
  # versions of max_session_loss_usdc; they catch a bad streak before it
  # eats the day's allowance.
  rolling_window_n: 20             # how many recent trades to evaluate
  rolling_pnl_floor_usdc: -100     # halt if last N trades sum to less than this
  rolling_winrate_floor: 0.30      # halt if last N trades win rate < this

  # Lifetime-peak drawdown breaker. Disabled in favor of max_session_loss_usdc
  # + the rolling kill-switch above, which both auto-clear at session boundaries.
  # The peak-drawdown breaker latches forever (no auto-reset) and tripped on
  # 2026-04-28 at $328 balance, halting trading until manual restart.
  circuit_breaker_enabled: false
  circuit_breaker_threshold: 0.30  # only used if re-enabled; 30% drawdown

chainlink_feed:
  enabled: true
  symbol: "btc/usd"   # default; overridden per-asset from assets.{ASSET}.chainlink_symbol

vpn:
  require_non_us: true   # abort startup if external IP is US-based; set false to skip check

logging:
  level: "INFO"
  file: "logs/btc_updown_bot.log"
  trade_log_file: "logs/trades.jsonl"
  price_tick_file: "data/probability_ticks.jsonl"
