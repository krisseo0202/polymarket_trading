api:
  host: "https://clob.polymarket.com"
  chain_id: 137

trading:
  paper_trading: true   # flip to false for live trading
  interval: 300         # 5-minute cycles (seconds)
  exit_rule: default    # "default" (strategy-defined) or "hold_to_expiry" (settle at resolution)

btc_updown_bot:
  market_keywords: ["Bitcoin", "Up or Down"]  # title must contain all of these (case-insensitive)
  state_file: "bot_state.json"
  perf_db_path: "perf.db"
  min_volume: 0  # 0 — don't filter by volume so brand-new markets are found immediately

strategies:
  coin_toss:
    enabled: true              # baseline test; flip to false to disable
    position_size_usdc: 5.0    # small size for pipeline testing
    max_hold_seconds: 60       # short hold for testing — exit quickly
    profit_target_pct: 0.10   # 10% take-profit
    stop_loss_pct: 0.05        # 5% stop-loss
    min_confidence: 0.5        # coin flip always has confidence=0.5

  btc_updown:
    # Directional bias seeded from config; overridden at runtime via set_bias().
    # LONG = buy YES (BTC up), SHORT = buy NO (BTC down), NONE = flat.
    default_bias: "LONG"

    # Momentum confirmation: require this much upward return over the lookback window.
    confirmation_pct: 0.02              # 2% move required
    confirmation_window_seconds: 5      # compare mid_now vs mid 5s ago (range 3–8 s)

    # Exit thresholds
    profit_target_pct: 0.20   # take profit at +20% (range 10–30%)
    stop_loss_pct: 0.12        # stop loss at -12%
    max_hold_seconds: 240      # force-exit after 4 minutes regardless of PnL

    # Sizing
    position_size_usdc: 20.0   # spend ~$20 USDC per trade
    min_confidence: 0.7

  btc_updown_xgb:
    enabled: true
    btc_symbol: "BTC-USD"      # Coinbase product ID (aligns with Chainlink oracle source)
    btc_exchange: "coinbase"   # "coinbase" (default) | "binance_us"
    model_path: "models/btc_updown_xgb.json"
    feature_schema_path: "models/btc_updown_xgb_features.json"
    metadata_path: "models/btc_updown_xgb_meta.json"

    position_size_usdc: 20.0
    min_confidence: 0.54
    stop_loss_pct: 0.12
    max_hold_seconds: 240

    min_edge: 0.03
    min_prob_yes: 0.54
    max_prob_yes_for_no: 0.46
    max_spread_pct: 0.06
    exit_edge: -0.01
    min_seconds_to_expiry: 20
    max_seconds_to_expiry: 240

  prob_edge:
    # Probability-native edge strategy — production strategy path.
    # Decision: BUY YES/NO only when model edge exceeds threshold.
    # Model: BTCUpDownBaselineModel (GBM) by default; swap via model_service.
    enabled: true
    btc_symbol: "BTC-USD"        # BTC feed symbol
    btc_exchange: "coinbase"     # BTC feed exchange

    # Entry filters
    min_edge: 0.04               # edge = p - ask must clear this (e.g. p=0.60, ask=0.55 → edge=0.05)
    max_spread_pct: 0.06         # reject entry when spread > 6% of mid
    min_seconds_to_expiry: 30    # don't enter with < 30s until resolution
    max_seconds_to_expiry: 280   # don't enter at very start of slot (data warming up)

    # Exit rules
    stop_loss_pct: 0.15          # exit if position drops 15% from entry
    max_hold_seconds: 270        # force-exit before the 5-min window closes
    exit_edge: -0.02             # edge-reprice exit: close if model reprices edge < -0.02

    # Kelly sizing
    kelly_fraction: 0.15         # fractional Kelly multiplier (range 0.10–0.25)
    position_size_usdc: 30.0     # hard cap on notional per trade
    fee_enabled: true            # enable fee-aware net-edge filter for Polymarket fee-enabled crypto markets
    taker_fee_rate: 0.072        # docs formula input for crypto category as of 2026-04-02
    taker_fee_exponent: 1.0      # docs formula exponent for crypto category as of 2026-04-02

    # Confidence gate
    min_confidence: 0.51         # minimum model prob to allow trade

    # Sequential re-entry within a slot
    allow_reentry: true
    max_trades_per_slot: 3       # hard cap on entries per 5-min market
    re_entry_edge_mult: 1.5      # 2nd+ entry requires 1.5× the normal edge threshold
    re_entry_size_mult: 0.5      # 2nd+ entry uses 50% Kelly size (correlation haircut)
    slot_loss_limit_usdc: 15.0   # halt slot trading if cumulative loss exceeds this

  logreg_edge:
    # Legacy logistic regression edge strategy (uses old LogRegModel class).
    # Kept for backwards compatibility. New runs should use --strategy logreg
    # which loads the v4 model from models/logreg_v4.
    enabled: true
    btc_symbol: "BTC-USD"
    btc_exchange: "coinbase"
    model_dir: "models/logreg"

    delta: 0.05
    max_spread_pct: 0.06
    min_seconds_to_expiry: 10
    max_seconds_to_expiry: 295
    max_hold_seconds: 300        # hold-to-expiry; unused at runtime (exit_rule is hardcoded), capped at slot length for display/safety
    kelly_fraction: 0.15
    position_size_usdc: 30.0
    min_confidence: 0.51

  logreg:
    # Active logistic-regression strategy. Loads the v4 model
    # (18 features + isotonic calibration) via LogRegV4Model.
    enabled: true
    btc_symbol: "BTC-USD"
    btc_exchange: "coinbase"
    model_dir: "models/logreg_v4"

    # Entry filters
    delta: 0.025                  # minimum margin of safety beyond cost (override at runtime via --delta)
    max_spread_pct: 0.06         # reject if spread > 6% of mid
    min_seconds_to_expiry: 10    # don't enter with < 10s left (execution risk)
    max_seconds_to_expiry: 295   # allow entry near slot open
    min_entry_price: 0.30        # skip cheap contracts (data: <0.35 loses money)
    max_entry_price: 0.65        # skip expensive contracts (data: >0.65 loses money)
    min_entry_window_s: 10       # require ≥10s left in slot to open (matches min_seconds_to_expiry)

    # Hold-to-expiry: exit_rule is hardcoded to "hold_to_expiry" in
    # LogRegEdgeStrategy, so this value is not consulted at runtime.
    # Kept ≤ slot length (300s) so the dashboard display is truthful and
    # so that flipping exit_rule later doesn't silently disable the cap.
    max_hold_seconds: 300

    # Kelly sizing. Notional = clip(kelly_notional, min, max).
    #   min: operational floor — small balances produce sub-$5 raw Kelly,
    #        which isn't meaningfully placeable. Floor only applies when
    #        Kelly > 0 (no edge → no trade).
    #   max: explicit USDC ceiling enforced by the strategy. Do NOT trust
    #        RiskManager alone — see tasks/todo.md for the units fix.
    kelly_fraction: 0.10              # fractional Kelly multiplier
    min_position_size_usdc: 10.0      # floor — applied only when Kelly > 0
    max_position_size_usdc: 50.0      # hard ceiling per trade

    # Confidence gate
    min_confidence: 0.52         # minimum model prob to allow trade (raised from 0.51)

    # Online retraining: a daemon thread refits the model on a rolling
    # window of live CSV data. Hot-swaps only when the strategy is flat,
    # and only if the new valid_brier does not regress vs the current
    # production model by more than tolerance_brier.
    retrain:
      enabled: false             # flip to true once you've watched a few cycles
      interval_s: 3600           # run one retrain attempt every hour
      window_s: 172800           # use last 48h of live data
      tolerance_brier: 0.005     # accept new model iff new_brier ≤ prod_brier + this
      min_train_rows: 500        # skip the pass if the window has fewer rows than this
      # Recursive glob patterns — the bot writes session CSVs into
      # date-partitioned dirs (data/YYYY-MM-DD/). The `**/` prefix
      # ensures both flat (legacy) and partitioned files are found.
      ob_csv_glob:  "data/**/live_orderbook_snapshots*.csv"
      btc_csv_glob: "data/**/btc_live_1s*.csv"
      history_path: "data/retrain_history.jsonl"
      output_parent: "models"
      model_prefix: "logreg_v4"

  btc_vol_reversion:
    enabled: true
    # Z-score mean-reversion: fade overreactions by monitoring price volatility
    window_seconds: 90           # rolling window for mean/std computation
    min_samples: 20              # warmup guard: need at least 20 price samples
    zscore_threshold: 1.8        # trigger signal when |z| >= this value
    min_vol_threshold: 0.005     # skip if price std < half-cent (market too flat)

    # Exit thresholds — quick snapback is the expected behavior
    profit_target_pct: 0.03      # take profit at +3% (tight, mean-reversion is small)
    stop_loss_pct: 0.07          # stop loss at -7% (2:1+ R/R with >60% win rate)
    max_hold_seconds: 90         # force-exit after 90s (window = hold max)

    # Sizing
    position_size_usdc: 20.0
    min_confidence: 0.55

risk:
  max_position_pct: 0.05          # 5% of balance per position
  max_position_size: 200          # hard cap on shares per position
  max_total_exposure: 1.0         # total open notional as fraction of balance
  max_session_loss_usdc: 50      # absolute session loss cap; bot shuts down when reached

chainlink_feed:
  enabled: true
  symbol: "btc/usd"

vpn:
  require_non_us: true   # abort startup if external IP is US-based; set false to skip check

logging:
  level: "INFO"
  file: "logs/btc_updown_bot.log"
  trade_log_file: "logs/trades.jsonl"
  price_tick_file: "data/probability_ticks.jsonl"
