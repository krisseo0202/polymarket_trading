rationale: |
  First training run under the signed-indicator schema. Starts from the
  18 anchor features in experiments/full-s3-broad/selection.yaml (still
  valid — none of those were renamed) and adds all newly-added TD/UT/RSI
  indicator columns across single-TF (5s) and the 7-TF macro bank. No
  pre-training probe was run; this is a scouting pass to see whether the
  signed collapse + chart-aligned additions (td_display, td_tdst_*,
  ut_bars_since_signal) buy any Brier/Sharpe over the prior 18-feature
  baseline.
